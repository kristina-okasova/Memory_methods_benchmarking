# QwenLong-L1-32B × NarrativeQA — long-context reasoning BASELINE (no memory mechanism)
#
# NarrativeQA answers are short free-text and are scored primarily with ROUGE-L
# (see benchmark.py _ROUGE_L_DATASETS). QwenLong-L1's own narrativeqa eval uses
# the same template_0shot prompt as the other datasets, so no override is needed.
#
# Before running, start a vLLM server (or set mode: local):
#   vllm serve Tongyi-Zhiwen/QwenLong-L1-32B-AWQ \
#       --quantization awq --max-model-len 32768 --port 8000
#
# python benchmark.py --config configs/qwenlong_narrativeqa.yaml

model:
  adapter: qwenlong
  mode: remote
  model_name_or_path: Tongyi-Zhiwen/QwenLong-L1-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key: "123-abc"

  tensor_parallel_size: 1
  gpu_memory_utilization: 0.90
  max_model_len: 32768
  quantization: awq

  max_context_len: 30000
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.95

dataset:
  adapter: narrativeqa
  split: test                  # 10557 examples
  context_source: summary      # "summary" (~400 words) or "full_text" (raw, can be >100k tokens)
  # limit: 100
