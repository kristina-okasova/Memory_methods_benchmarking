# MemAgent × NarrativeQA (books & movie scripts)
# python benchmark.py --config configs/memagent_narrativeqa.yaml

model:
  adapter: memagent
  mode: remote
  model_name_or_path: BytedTsinghua-SIA/RL-MemoryAgent-7B
  base_url: http://localhost:8000/v1
  api_key: "123-abc"
  chunk_size: 5000
  max_context_len: 120000
  max_new_tokens: 1024
  temperature: 0.0
  top_p: 1.0

dataset:
  adapter: narrativeqa
  split: test                  # 10557 examples
  context_source: summary      # "summary" (~400 words) or "full_text" (raw HTML, very long)
  # limit: 100
