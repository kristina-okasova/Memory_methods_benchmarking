# QwenLong-L1-32B × HotpotQA — long-context reasoning BASELINE (no memory mechanism)
#
# QwenLong-L1 reads the full (truncated) context in a single prompt — no chunking,
# no recurrent memory, no retrieval. Useful as a "brute-force long-context" point
# of comparison against memagent / rememr1 / memalpha / deltamem.
#
# Before running, start a vLLM server (or set mode: local):
#   vllm serve Tongyi-Zhiwen/QwenLong-L1-32B-AWQ \
#       --quantization awq --max-model-len 32768 --port 8000
#
# Then run:
#   python benchmark.py --config configs/qwenlong_hotpotqa.yaml
#   python benchmark.py --config configs/qwenlong_hotpotqa.yaml --limit 100   # quick test

model:
  adapter: qwenlong
  mode: remote          # "local" to have the harness start vLLM itself

  # AWQ int4 checkpoint — ~18GB, recommended for a single H100.
  # Use Tongyi-Zhiwen/QwenLong-L1-32B (bf16, ~64GB) only if you have the headroom.
  model_name_or_path: Tongyi-Zhiwen/QwenLong-L1-32B-AWQ

  base_url: http://localhost:8000/v1
  api_key: "123-abc"          # matches vLLM default; override via QWENLONG_API_KEY env var

  # ---- local mode only (ignored when mode: remote) ----
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.90
  max_model_len: 32768
  quantization: awq           # set to null/omit when using the bf16 checkpoint

  # ---- inference parameters (match official eval: temperature 0.7, top_p 0.95) ----
  max_context_len: 16000      # center-crop contexts longer than this (tokens) — lowered from 30000 for runtime
  max_new_tokens: 2048        # generation budget — model "thinks" before answering — lowered from 4096 for runtime
  temperature: 0.7
  top_p: 0.95

dataset:
  adapter: hotpotqa
  hf_config: distractor        # "distractor" (10 docs)
  split: validation            # 7405 examples
  # limit: 100                 # uncomment to cap for a quick smoke-test
