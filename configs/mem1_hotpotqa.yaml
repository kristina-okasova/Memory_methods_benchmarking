# MEM1 (MIT-MI/MEM1) × HotpotQA
#
# NOTE: this is an ADAPTATION, not a faithful reproduction. MEM1's own eval has
# no `context` field — <search> normally hits a live Wikipedia/FlashRAG retrieval
# server. Here, <search> is served by a per-example BM25 index built on the fly
# over this example's `context` (see models/mem1.py for details/caveats).
#
# Before running, start a vLLM server (or set mode: local):
#   vllm serve Mem-Lab/Qwen2.5-7B-RL-RAG-Q2-EM-Release \
#       --max-model-len 8192 --gpu-memory-utilization 0.6 --port 8000
#
# Then run:
#   python benchmark.py --config configs/mem1_hotpotqa.yaml
#   python benchmark.py --config configs/mem1_hotpotqa.yaml --limit 100   # quick test

model:
  adapter: mem1
  mode: remote          # "local" to have the harness start vLLM itself

  model_name_or_path: Mem-Lab/Qwen2.5-7B-RL-RAG-Q2-EM-Release
  tokenizer_path: Qwen/Qwen2.5-7B    # base tokenizer, used for apply_chat_template

  base_url: http://localhost:8000/v1

  # ---- local mode only (ignored when mode: remote) ----
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.6
  max_model_len: 8192

  # ---- MEM1 agent-loop parameters (match the official inference code) ----
  max_iterations: 6     # MAX_ITERATION
  top_k: 3               # passages returned per <search> (BM25 over context)
  max_new_tokens: 1024   # per-turn generation budget
  temperature: 0.01
  top_p: 0.95

dataset:
  adapter: hotpotqa
  hf_config: distractor        # "distractor" (10 docs)
  split: validation            # 7405 examples
  # limit: 100                 # uncomment to cap for a quick smoke-test
