# Mem-alpha × NarrativeQA (books & movie scripts)
#
# Direct mode: python benchmark.py --config configs/memalpha_narrativeqa.yaml
# Server mode: set mode: server and start vLLM + memory_server.py first (see memalpha_hotpotqa.yaml)

model:
  adapter: memalpha
  mode: direct

  memalpha_repo_path: Mem-alpha
  agent_config_path: Mem-alpha/config/memalpha-qwen3-4b_agent_0.05-0.1.yaml
  chunk_size: 2000
  memory_server_url: http://localhost:5005

dataset:
  adapter: narrativeqa
  split: test
  context_source: summary      # "summary" (~400 words) or "full_text" (raw HTML, very long)
  # limit: 100
