# ReMemR1 × QASPER (information-seeking QA over NLP papers)
#
# Before running, start a SGLang server:
#   python -m sglang.launch_server \
#       --model-path yrshi/ReMemR1-7B \
#       --served-model-name yrshi/ReMemR1-7B \
#       --port 8000
#
# Then run:
#   python benchmark.py --config configs/rememr1_qasper.yaml

model:
  adapter: rememr1

  model_name_or_path: yrshi/ReMemR1-7B

  base_url: http://localhost:8000/v1
  api_key: "123-abc"

  chunk_size: 5000
  max_context_len: 120000
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.95

dataset:
  adapter: qasper
  split: validation
  # limit: 50                  # caps number of papers (not QA pairs)
