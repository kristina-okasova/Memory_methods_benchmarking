# Mem-alpha × MuSiQue (multi-hop QA, 2–4 hops over Wikipedia)
#
# Direct mode: python benchmark.py --config configs/memalpha_musique.yaml
# Server mode: set mode: server and start vLLM + memory_server.py first (see memalpha_hotpotqa.yaml)

model:
  adapter: memalpha
  mode: direct

  memalpha_repo_path: Mem-alpha
  agent_config_path: Mem-alpha/config/memalpha-qwen3-4b_agent_0.05-0.1.yaml
  chunk_size: 2000
  memory_server_url: http://localhost:5005

dataset:
  adapter: musique
  split: validation
  only_answerable: true
  # limit: 100
